<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Good Food — Оформлення замовлення</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ─── CHECKOUT PAGE ─── */
    .checkout-page {
      min-height: 100vh;
      background: var(--cream);
      padding: 40px 5% 80px;
    }
 
    .checkout-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--gray);
      font-size: .9rem;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 32px;
      transition: color .2s;
    }
    .checkout-back:hover { color: var(--orange-dark); }
 
    .checkout-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 32px;
    }
 
    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
      align-items: start;
    }
 
    /* ─── FORM CARD ─── */
    .checkout-card {
      background: white;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
    }
 
    .checkout-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 22px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--cream);
    }
 
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
 
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
 
    .form-group.full { grid-column: 1 / -1; }
 
    .form-group label {
      font-size: .82rem;
      font-weight: 800;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
 
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px 16px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: .95rem;
      color: var(--dark);
      outline: none;
      transition: border-color .2s;
      background: white;
    }
 
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--orange);
    }
 
    .form-group textarea {
      resize: none;
      height: 90px;
    }
 
    /* Delivery type toggle */
    .delivery-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
 
    .delivery-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border: 2px solid #eee;
      border-radius: 12px;
      cursor: pointer;
      transition: all .2s;
      font-weight: 700;
      font-size: .9rem;
      color: var(--gray);
    }
 
    .delivery-option.active {
      border-color: var(--orange);
      background: #fff8ee;
      color: var(--orange-dark);
    }
 
    .delivery-option input { display: none; }
 
    /* Payment options */
    .payment-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 0;
    }
 
    .payment-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 2px solid #eee;
      border-radius: 12px;
      cursor: pointer;
      transition: all .2s;
      font-weight: 700;
      font-size: .9rem;
      color: var(--gray);
    }
 
    .payment-option.active {
      border-color: var(--orange);
      background: #fff8ee;
      color: var(--orange-dark);
    }
 
    .payment-option input { display: none; }
 
    .payment-icon { font-size: 1.3rem; }
 
    /* ─── ORDER SUMMARY ─── */
    .order-summary {
      background: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
      position: sticky;
      top: 80px;
    }
 
    .order-summary h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--cream);
    }
 
    .summary-items {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }
 
    .summary-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
 
    .summary-item img {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }
 
    .summary-item-info {
      flex: 1;
    }
 
    .summary-item-name {
      font-size: .88rem;
      font-weight: 700;
      color: var(--dark);
      display: block;
    }
 
    .summary-item-qty {
      font-size: .8rem;
      color: var(--gray);
    }
 
    .summary-item-price {
      font-size: .9rem;
      font-weight: 800;
      color: var(--orange-dark);
      white-space: nowrap;
    }
 
    .summary-empty {
      text-align: center;
      color: var(--gray);
      font-size: .9rem;
      padding: 20px 0;
    }
 
    .summary-divider {
      height: 1px;
      background: var(--cream);
      margin: 16px 0;
    }
 
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: .88rem;
      color: var(--gray);
      margin-bottom: 8px;
    }
 
    .summary-row span:last-child { font-weight: 700; color: var(--dark); }
 
    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--dark);
      margin-top: 12px;
    }
 
    .summary-total span:last-child { color: var(--red-orange); }
 
    .place-order-btn {
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      background: var(--red-orange);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: background .2s, transform .15s;
    }
 
    .place-order-btn:hover {
      background: #d94218;
      transform: translateY(-2px);
    }
 
    .place-order-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
 
    /* ─── SUCCESS SCREEN ─── */
    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 20px;
      animation: fadeUp .5s ease both;
    }
 
    .success-screen.show { display: flex; }
 
    .success-icon {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, var(--orange), var(--red-orange));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 24px;
      box-shadow: 0 12px 36px rgba(245,166,35,.4);
    }
 
    .success-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 12px;
    }
 
    .success-screen p {
      color: var(--gray);
      font-size: 1rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }
 
    .success-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--orange);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s;
    }
 
    .success-back-btn:hover { background: var(--orange-dark); }
 
    /* ─── RESPONSIVE ─── */
    @media (max-width: 860px) {
      .checkout-grid {
        grid-template-columns: 1fr;
      }
      .order-summary { position: static; }
    }
 
    @media (max-width: 500px) {
      .form-row { grid-template-columns: 1fr; }
      .delivery-toggle { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
